<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dev Movie — ดูหนังออนไลน์</title>
  <meta name="description" content="Dev Movie — แพลตฟอร์มดูหนังออนไลน์พรีเมียม ภาพยนตร์และซีรีส์กว่า 20,000 เรื่อง" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>

<body>

  <!-- ========== SIDE NAVIGATION ========== -->
  <aside class="side-nav" id="sideNav">
    <div class="side-nav-top">
      <div class="nav-brand">DM</div>
      <button class="side-icon active" data-page="home" title="หน้าแรก">
        <i class="fas fa-home"></i>
      </button>
      <button class="side-icon" data-page="search" title="ค้นหา">
        <i class="fas fa-search"></i>
      </button>
      <button class="side-icon" data-page="movies" title="ภาพยนตร์">
        <i class="fas fa-film"></i>
      </button>
      <button class="side-icon" data-page="series" title="ซีรีส์">
        <i class="fas fa-tv"></i>
      </button>
      <button class="side-icon" data-page="saved" title="รายการโปรด">
        <i class="fas fa-bookmark"></i>
      </button>
    </div>
    <div class="side-nav-bottom">
      <button class="side-icon" title="ตั้งค่า">
        <i class="fas fa-gear"></i>
      </button>
    </div>
  </aside>

  <!-- ========== MAIN APP ========== -->
  <div class="app-wrapper">

    <!-- ========== HEADER ========== -->
    <header class="glass-header" id="mainHeader">
      <div class="header-left">
        <div class="brand-logo" id="brandLogo">
          <span class="brand-dev">Dev</span>
          <span class="brand-movie">Movie</span>
        </div>
      </div>
      <nav class="header-nav">
        <a href="#" class="nav-link active" data-page="home">หน้าแรก</a>
        <a href="#" class="nav-link" data-page="movies">ภาพยนตร์</a>
        <a href="#" class="nav-link" data-page="series">ซีรีส์</a>
        <a href="#" class="nav-link" data-page="cartoons">การ์ตูน</a>
        <a href="#" class="nav-link" data-page="trending">กำลังฮิต</a>
      </nav>
      <div class="header-right">
        <div class="search-glass" id="searchBox">
          <i class="fas fa-search"></i>
          <input type="text" id="searchInput" placeholder="ค้นหาหนัง ซีรีส์..." autocomplete="off" />
        </div>
        <div class="notification-icon">
          <i class="fas fa-bell"></i>
          <span class="notif-dot"></span>
        </div>
        <div class="user-avatar">
          <img src="https://upload.wikimedia.org/wikipedia/commons/0/0b/Netflix-avatar.png" alt="User" />
        </div>
      </div>
    </header>

    <!-- ========== CONTENT ========== -->
    <main class="main-content" id="mainContent">

      <!-- Hero Billboard -->
      <section class="hero-billboard" id="heroBillboard">
        <div class="hero-skeleton shimmer"></div>
      </section>

      <!-- Quick Category Row -->
      <section class="category-row" id="categoryRow">
        <div class="category-header">
          <h2 class="section-heading">🔥 กำลังฮิตตอนนี้</h2>
          <button class="see-all-btn" data-page="trending">ดูทั้งหมด <i class="fas fa-chevron-right"></i></button>
        </div>
        <div class="horizontal-carousel" id="trendingRow"></div>
      </section>

      <!-- Popular Movies -->
      <section class="category-row" id="popularSection">
        <div class="category-header">
          <h2 class="section-heading">⭐ ภาพยนตร์ยอดนิยม</h2>
          <button class="see-all-btn" data-page="movies">ดูทั้งหมด <i class="fas fa-chevron-right"></i></button>
        </div>
        <div class="horizontal-carousel" id="popularRow"></div>
      </section>

      <!-- Top Rated TV -->
      <section class="category-row" id="tvSection">
        <div class="category-header">
          <h2 class="section-heading">📺 ซีรีส์ยอดนิยม</h2>
          <button class="see-all-btn" data-page="series">ดูทั้งหมด <i class="fas fa-chevron-right"></i></button>
        </div>
        <div class="horizontal-carousel" id="tvRow"></div>
      </section>

      <!-- Mid Billboard -->
      <section class="mid-billboard" id="midBillboard"></section>

      <!-- Genre Filter Section -->
      <section class="filter-bar" id="filterBar">
        <div class="filter-tabs-row">
          <button class="filter-chip active" data-filter="all">ทั้งหมด</button>
          <button class="filter-chip" data-filter="28">แอคชั่น</button>
          <button class="filter-chip" data-filter="35">ตลก</button>
          <button class="filter-chip" data-filter="27">สยองขวัญ</button>
          <button class="filter-chip" data-filter="10749">โรแมนติก</button>
          <button class="filter-chip" data-filter="878">ไซไฟ</button>
          <button class="filter-chip" data-filter="16">แอนิเมชั่น</button>
          <button class="filter-chip" data-filter="18">ดราม่า</button>
          <button class="filter-chip" data-filter="53">ระทึกขวัญ</button>
        </div>
      </section>

      <!-- Grid Result -->
      <section class="content-grid" id="gridContent"></section>

      <!-- Load More -->
      <div class="load-more-wrap" id="loadMoreWrap">
        <button class="glass-btn load-more-btn" id="loadMoreBtn">
          <i class="fas fa-plus"></i> โหลดเพิ่มเติม
        </button>
        <p class="movie-count" id="movieCount"></p>
      </div>

    </main>

    <!-- ========== FOOTER ========== -->
    <footer class="glass-footer">
      <div class="footer-brand">
        <span class="brand-dev">Dev</span><span class="brand-movie">Movie</span>
      </div>
      <p class="footer-text">ภาพยนตร์และซีรีส์กว่า 20,000+ เรื่อง • สตรีมมิ่งคุณภาพสูง</p>
      <div class="footer-links">
        <a href="#">เกี่ยวกับเรา</a>
        <a href="#">ติดต่อ</a>
        <a href="#">ข้อกำหนด</a>
        <a href="#">ความเป็นส่วนตัว</a>
      </div>
      <p class="footer-copy">© 2026 Dev Movie. All rights reserved.</p>
    </footer>

  </div>

  <!-- ========== MODAL ========== -->
  <div class="modal-overlay" id="movieModal" style="display:none">
    <div class="modal-glass" id="modalContent"></div>
  </div>

  <script src="script.js"></script>
</body>

</html>
