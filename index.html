<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EVC - Ultimate Movies & Series</title>
  <meta name="description"
    content="EVC - Your premium streaming platform. Watch movies and series with the best experience." />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap"
    rel="stylesheet">
  <!-- Supabase Client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>

<body>

  <!-- ========== APP CONTAINER ========== -->
  <div class="app" id="appContainer">

    <!-- Sidebar Overlay (mobile) -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- ========== SIDEBAR ========== -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <div class="logo-icon">
            <i class="fas fa-play-circle"></i>
          </div>
          <div class="logo-text">
            <h2>EVC</h2>
            <span>E-Video Cloud</span>
          </div>
        </div>
        <button class="hamburger-close" id="hamburgerBtn"><i class="fas fa-times"></i></button>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section">
          <span class="section-title">Explore</span>
          <div class="nav-item active" data-page="home">
            <i class="fas fa-home"></i><span>Home</span>
          </div>
          <div class="nav-item" data-page="trending">
            <i class="fas fa-fire"></i><span>Trending</span>
          </div>
          <div class="nav-item" data-page="series">
            <i class="fas fa-tv"></i><span>Series</span>
          </div>
          <div class="nav-item" data-page="coming-soon">
            <i class="fas fa-rocket"></i><span>Coming Soon</span>
          </div>
          <div class="nav-item" data-page="categories">
            <i class="fas fa-th-large"></i><span>Categories</span>
          </div>
        </div>

        <div class="nav-section">
          <span class="section-title">Library</span>
          <div class="nav-item" data-page="history">
            <i class="fas fa-clock-rotate-left"></i><span>History</span>
          </div>
          <div class="nav-item" data-page="saved">
            <i class="fas fa-bookmark"></i><span>Saved</span>
          </div>
          <div class="nav-item" data-page="library">
            <i class="fas fa-photo-film"></i><span>My Library</span>
          </div>
          <div class="nav-item" data-page="downloads">
            <i class="fas fa-download"></i><span>Downloads</span>
          </div>
        </div>

        <div class="nav-section">
          <span class="section-title">System</span>
          <div class="nav-item" data-page="settings">
            <i class="fas fa-gear"></i><span>Settings</span>
          </div>
        </div>
      </nav>

      <div class="sidebar-footer">
        <div class="nav-item" data-page="help">
          <i class="fas fa-circle-question"></i><span>Help</span>
        </div>
        <div class="copyright">©2026 EVC Premium</div>
      </div>
    </aside>

    <!-- ========== MAIN CONTENT ========== -->
    <div class="main">

      <!-- Header -->
      <header class="header">
        <button class="mobile-hamburger" id="mobileHamburger"><i class="fas fa-bars"></i></button>

        <div class="search-bar">
          <i class="fas fa-search"></i>
          <input type="text" id="searchInput" placeholder="Search movies, series..." autocomplete="off" />
          <button class="search-btn" id="searchBtn">Search</button>
        </div>

        <div class="header-info-banner">
          <span>Exploring 20,000+ Movies & Series</span>
        </div>
        <div class="header-actions">
          <button class="header-action-btn" id="headerSavedBtn" title="Saved"><i class="fas fa-bookmark"></i></button>
          <button class="header-action-btn" id="headerHistoryBtn" title="History"><i
              class="fas fa-clock-rotate-left"></i></button>
        </div>
      </header>
      <!-- Dynamic Content Area -->
      <div class="content" id="contentArea">
        <!-- SPA content rendered here -->
      </div>

    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
