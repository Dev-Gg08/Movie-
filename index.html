<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EVC - E-Video Cloud | Movie Streaming</title>
  <meta name="description"
    content="EVC - Your personal movie streaming platform. Watch the latest movies, TV series, anime and more." />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <!-- Supabase JS Client (UMD build for browser) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>

<body>

  <!-- ========== LOGIN PAGE ========== -->
  <div class="login-page" id="loginPage">
    <div class="login-bg"></div>
    <div class="login-card">
      <div class="login-logo">
        <div class="logo-icon">⚛</div>
        <h1>EVC</h1>
        <span>E-Video Cloud</span>
      </div>
      <p class="login-subtitle">Your personal movie streaming platform</p>
      <button class="google-login-btn" id="googleLoginBtn">
        <svg width="20" height="20" viewBox="0 0 48 48">
          <path fill="#FFC107"
            d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z" />
          <path fill="#FF3D00"
            d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z" />
          <path fill="#4CAF50"
            d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z" />
          <path fill="#1976D2"
            d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z" />
        </svg>
        Sign in with Google
      </button>
      <div class="login-divider"><span>or</span></div>
      <button class="guest-login-btn" id="guestLoginBtn">
        <i class="fas fa-user-secret"></i> Continue as Guest
      </button>
      <p class="login-note">Guest mode uses local storage only</p>
    </div>
  </div>

  <!-- ========== APP (hidden until login) ========== -->
  <div class="app" id="appContainer" style="display:none;">

    <!-- Sidebar Overlay (mobile) -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- ========== SIDEBAR ========== -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <button class="hamburger" id="hamburgerBtn"><i class="fas fa-bars"></i></button>
        <div class="logo">
          <div class="logo-icon">⚛</div>
          <div class="logo-text">
            <h2>EVC</h2>
            <span>E- Video Cloud</span>
          </div>
        </div>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section">
          <div class="nav-item active" data-page="home">
            <i class="fas fa-home"></i><span>Home</span>
          </div>
          <div class="nav-item" data-page="trending">
            <i class="fas fa-fire"></i><span>Trending</span>
          </div>
          <div class="nav-item" data-page="coming-soon">
            <i class="fas fa-rocket"></i><span>Coming Soon</span>
          </div>
          <div class="nav-item" data-page="categories">
            <i class="fas fa-filter"></i><span>Categories</span>
          </div>
        </div>

        <div class="nav-section">
          <div class="nav-item" data-page="history">
            <i class="fas fa-clock-rotate-left"></i><span>History</span>
          </div>
          <div class="nav-item" data-page="saved">
            <i class="fas fa-bookmark"></i><span>Saved</span>
          </div>
          <div class="nav-item" data-page="library">
            <i class="fas fa-photo-film"></i><span>My Library</span>
          </div>
          <div class="nav-item" data-page="downloads">
            <i class="fas fa-download"></i><span>Downloads</span>
          </div>
        </div>

        <div class="nav-section">
          <div class="nav-item" data-page="settings">
            <i class="fas fa-gear"></i><span>Settings</span>
          </div>
          <div class="nav-item" data-page="account">
            <i class="fas fa-user"></i><span>Your Account</span>
          </div>
        </div>
      </nav>

      <div class="sidebar-footer">
        <div class="nav-item" data-page="help">
          <i class="fas fa-circle-question"></i><span>Help & Information</span>
        </div>
        <div class="nav-item logout" id="logoutBtn">
          <i class="fas fa-right-from-bracket"></i><span>Log Out</span>
        </div>
        <div class="copyright">©2025 EVC</div>
      </div>
    </aside>

    <!-- ========== MAIN ========== -->
    <div class="main">

      <!-- Header -->
      <header class="header">
        <button class="mobile-hamburger" id="mobileHamburger"><i class="fas fa-bars"></i></button>

        <div class="search-bar">
          <input type="text" id="searchInput" placeholder="Search..." autocomplete="off" />
          <button class="search-btn" id="searchBtn"><i class="fas fa-search"></i></button>
          <button class="mic-btn"><i class="fas fa-microphone"></i></button>
        </div>

        <div class="header-actions">
          <button class="header-action-btn" id="notifBtn">
            <i class="fas fa-bell"></i>
            <span class="badge" id="notifBadge"></span>
          </button>
          <button class="header-action-btn" id="headerSavedBtn"><i class="fas fa-bookmark"></i></button>
          <button class="header-action-btn" id="headerHistoryBtn"><i class="fas fa-clock-rotate-left"></i></button>
          <div class="header-divider"></div>
          <div class="user-avatar" id="headerAvatarBtn">M</div>
        </div>
      </header>

      <!-- Dynamic Content Area -->
      <div class="content" id="contentArea">
      </div>

    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
